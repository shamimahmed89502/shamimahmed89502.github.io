<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      font-weight: bold;
    }
    input {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px 15px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Age Calculator</h2>
    
    <label for="dob">Date of Birth:</label><br>
    <input type="date" id="dob"><br><br>

    <label for="currentDate">Current Date:</label><br>
    <input type="date" id="currentDate"><br><br>

    <button onclick="calculateAge()">Calculate Age</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    // Set current date as default
    document.getElementById("currentDate").valueAsDate = new Date();

    function calculateAge() {
      const dob = new Date(document.getElementById("dob").value);
      const currentDate = new Date(document.getElementById("currentDate").value);

      if (!dob || !document.getElementById("dob").value) {
        document.getElementById("result").innerHTML = "Please select your date of birth.";
        return;
      }

      let years = currentDate.getFullYear() - dob.getFullYear();
      let months = currentDate.getMonth() - dob.getMonth();
      let days = currentDate.getDate() - dob.getDate();

      if (days < 0) {
        months--;
        days += new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
      }
      if (months < 0) {
        years--;
        months += 12;
      }

      document.getElementById("result").innerHTML = 
        `You are ${years} years, ${months} months, and ${days} days old.`;
    }
  </script>
</body>
</html>
